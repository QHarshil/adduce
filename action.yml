name: "adduce artifact audit"
description: "Audit a research artifact: paper-code drift, seeds, dependencies, environment capture, data provenance, remote pinning, and documentation."
branding:
  icon: "check-circle"
  color: "green"

inputs:
  path:
    description: "Repository path to scan."
    required: false
    default: "."
  profile:
    description: "Scoring profile (default, neurips, iclr, acl, acm, strict)."
    required: false
    default: "default"
  fail-under:
    description: "Fail the job when the total score is below this value. 0 disables gating."
    required: false
    default: "0"
  fail-on-regression:
    description: "Fail the job when any rule regresses against the committed .adduce/baseline.json."
    required: false
    default: "false"
  sarif-file:
    description: "Also write a SARIF report to this path (upload it with github/codeql-action/upload-sarif)."
    required: false
    default: ""
  report-file:
    description: "Also write a Markdown report to this path (useful for PR comments and job summaries)."
    required: false
    default: ""
  version:
    description: "Exact adduce release version to install from PyPI (for example, 0.1.1)."
    required: false
    default: "0.1.1"

outputs:
  score:
    description: "Total reproducibility score (0-100)."
    value: ${{ steps.score.outputs.score }}

runs:
  using: "composite"
  steps:
    - name: Install adduce
      shell: bash
      env:
        ADDUCE_INPUT_VERSION: ${{ inputs.version }}
      run: |
        SPEC="adduce"
        if [ -n "$ADDUCE_INPUT_VERSION" ]; then SPEC="adduce==$ADDUCE_INPUT_VERSION"; fi
        python -m pip install --quiet "$SPEC"

    - name: Run check
      id: score
      shell: bash
      env:
        ADDUCE_INPUT_PATH: ${{ inputs.path }}
        ADDUCE_INPUT_PROFILE: ${{ inputs.profile }}
        ADDUCE_INPUT_FAIL_UNDER: ${{ inputs.fail-under }}
        ADDUCE_INPUT_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
        ADDUCE_INPUT_SARIF_FILE: ${{ inputs.sarif-file }}
        ADDUCE_INPUT_REPORT_FILE: ${{ inputs.report-file }}
      run: |
        BASE_ARGS=("$ADDUCE_INPUT_PATH" --profile "$ADDUCE_INPUT_PROFILE")
        GATE_ARGS=("${BASE_ARGS[@]}")
        RESULT_FILE="${RUNNER_TEMP:-.}/adduce-result-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}.json"
        trap 'rm -f -- "$RESULT_FILE"' EXIT
        if [ "$ADDUCE_INPUT_FAIL_UNDER" != "0" ]; then
          GATE_ARGS+=(--fail-under "$ADDUCE_INPUT_FAIL_UNDER")
        fi
        if [ "$ADDUCE_INPUT_FAIL_ON_REGRESSION" = "true" ]; then
          GATE_ARGS+=(--fail-on-regression)
        fi

        adduce check "${BASE_ARGS[@]}" --format json --output "$RESULT_FILE"
        SCORE=$(python -c "import json, sys; print(json.load(open(sys.argv[1]))['total'])" "$RESULT_FILE")
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"

        if [ -n "$ADDUCE_INPUT_SARIF_FILE" ]; then
          adduce check "${BASE_ARGS[@]}" --format sarif --output "$ADDUCE_INPUT_SARIF_FILE"
        fi
        if [ -n "$ADDUCE_INPUT_REPORT_FILE" ]; then
          adduce check "${BASE_ARGS[@]}" --format markdown --output "$ADDUCE_INPUT_REPORT_FILE"
          cat -- "$ADDUCE_INPUT_REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
        fi

        adduce check "${GATE_ARGS[@]}"
